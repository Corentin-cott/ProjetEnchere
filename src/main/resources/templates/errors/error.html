<!-- login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="fr" layout:decorate="~{layout}">
<head>
    <title layout:fragment="title" th:text="'Erreur ' + ${errorNo}">Erreur</title>
</head>
<body>
<main layout:fragment="content">
    <div th:if="${error}" class="eni-danger-container">
        <div class="eni-box-content" style="width: 100%;">
            <p>Erreur : <span th:text="${error}"></span></p>
        </div>
    </div>

    <div class="eni-box-container" style="display: block">
        <h2 class="eni-h2">Erreur - <span th:text="${errorNo}"></span></h2>
        <div class="eni-box-content">

            <form th:action="@{/}" method="get">
                <button class="eni-important-button" style="width: 100%">
                    Revenir en lieu sûr
                </button>
            </form>

        </div>

    </div>
</main>
</body>
</html>
